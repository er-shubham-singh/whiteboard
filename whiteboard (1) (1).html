<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InfiniteBoard — Infinite Canvas, Infinite Ideas</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Cabinet+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --bg: #0d0d11;
    --surface: #16161d;
    --surface2: #1e1e28;
    --surface3: #252530;
    --border: #2e2e3e;
    --accent: #7c6aff;
    --accent2: #ff6ab0;
    --accent3: #6affcc;
    --text: #e8e8f0;
    --text2: #9090a8;
    --text3: #5a5a72;
    --danger: #ff4f6a;
    --warn: #ffd166;
    --radius: 12px;
    --shadow: 0 8px 32px rgba(0,0,0,0.5);
    --tool-size: 42px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  /* ── TOPBAR ── */
  #topbar {
    height: 52px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    z-index: 100;
    flex-shrink: 0;
  }

  #logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 17px;
    color: var(--accent);
    letter-spacing: -0.5px;
    white-space: nowrap;
    margin-right: 4px;
  }
  #logo span { color: var(--accent2); }

  #board-tabs {
    display: flex;
    align-items: center;
    gap: 4px;
    overflow-x: auto;
    flex: 1;
    scrollbar-width: none;
  }
  #board-tabs::-webkit-scrollbar { display: none; }

  .board-tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 8px;
    background: transparent;
    border: 1px solid transparent;
    color: var(--text2);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .board-tab:hover { background: var(--surface2); color: var(--text); }
  .board-tab.active {
    background: var(--surface3);
    border-color: var(--border);
    color: var(--text);
  }
  .board-tab .tab-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }
  .board-tab .close-tab {
    width: 16px; height: 16px;
    border-radius: 4px;
    background: transparent;
    border: none;
    color: var(--text3);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    transition: all 0.1s;
  }
  .board-tab .close-tab:hover { background: var(--danger); color: white; }

  #add-board-btn {
    flex-shrink: 0;
    width: 30px; height: 30px;
    border-radius: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    transition: all 0.15s;
  }
  #add-board-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }

  #topbar-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: 8px;
  }

  .top-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text2);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .top-btn:hover { background: var(--surface3); color: var(--text); }
  .top-btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
  .top-btn.primary:hover { background: #9280ff; }
  .top-btn.success { background: var(--accent3); border-color: var(--accent3); color: #000; }
  .top-btn.success:hover { opacity: 0.85; }

  /* ── WORKSPACE ── */
  #workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── TOOLBAR ── */
  #toolbar {
    width: 64px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 0;
    gap: 4px;
    z-index: 50;
    flex-shrink: 0;
  }

  .tool-group { 
    display: flex; flex-direction: column; align-items: center;
    gap: 4px; padding: 6px 0;
    border-bottom: 1px solid var(--border);
    width: 100%;
  }
  .tool-group:last-child { border-bottom: none; }

  .tool-btn {
    width: var(--tool-size); height: var(--tool-size);
    border-radius: 10px;
    background: transparent;
    border: 1px solid transparent;
    color: var(--text2);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    transition: all 0.15s;
    position: relative;
  }
  .tool-btn:hover { background: var(--surface2); color: var(--text); }
  .tool-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    box-shadow: 0 0 12px rgba(124,106,255,0.35);
  }
  .tool-btn .tooltip {
    position: absolute;
    left: calc(100% + 10px);
    background: var(--surface3);
    color: var(--text);
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 11px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transform: translateX(-4px);
    transition: all 0.15s;
    border: 1px solid var(--border);
    z-index: 200;
  }
  .tool-btn:hover .tooltip { opacity: 1; transform: translateX(0); }

  /* color swatches */
  #color-swatch {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 3px solid var(--border);
    cursor: pointer;
    transition: border-color 0.15s;
  }
  #color-swatch:hover { border-color: var(--accent); }

  #stroke-size {
    width: 40px;
    -webkit-appearance: none;
    appearance: none;
    writing-mode: vertical-lr;
    height: 60px;
    background: transparent;
  }
  #stroke-size::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  #stroke-size::-webkit-slider-runnable-track {
    width: 3px;
    background: var(--border);
    border-radius: 2px;
  }

  /* ── CANVAS AREA ── */
  #canvas-container {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #13131a;
    background-image:
      radial-gradient(circle at 1px 1px, var(--border) 1px, transparent 0);
    background-size: 28px 28px;
  }

  #main-canvas {
    position: absolute;
    top: 0; left: 0;
    cursor: crosshair;
    touch-action: none;
  }

  /* ── PROPERTIES PANEL ── */
  #props-panel {
    width: 220px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 16px 12px;
    gap: 16px;
    overflow-y: auto;
    flex-shrink: 0;
  }
  #props-panel::-webkit-scrollbar { width: 4px; }
  #props-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .panel-title {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .prop-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .prop-label {
    font-size: 10px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .color-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 4px;
  }

  .color-dot {
    width: 24px; height: 24px;
    border-radius: 6px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.1s;
  }
  .color-dot:hover, .color-dot.active { border-color: white; transform: scale(1.1); }

  .prop-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }
  .prop-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  .opacity-display {
    font-size: 11px;
    color: var(--text2);
    text-align: right;
  }

  .board-stats {
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text2);
  }
  .stat-val { color: var(--accent3); font-weight: 500; }

  .action-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .panel-btn {
    padding: 8px 6px;
    border-radius: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .panel-btn:hover { background: var(--surface3); color: var(--text); }
  .panel-btn.danger:hover { background: var(--danger); border-color: var(--danger); color: white; }
  .panel-btn.highlight { background: rgba(124,106,255,0.15); border-color: var(--accent); color: var(--accent); }
  .panel-btn.highlight:hover { background: var(--accent); color: white; }

  /* ── ZOOM CONTROLS ── */
  #zoom-controls {
    position: absolute;
    bottom: 20px;
    right: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px 10px;
    z-index: 50;
  }
  .zoom-btn {
    width: 26px; height: 26px;
    border-radius: 6px;
    background: var(--surface2);
    border: none;
    color: var(--text);
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.1s;
  }
  .zoom-btn:hover { background: var(--accent); color: white; }
  #zoom-level { font-size: 11px; color: var(--text2); min-width: 38px; text-align: center; }

  /* ── STATUS BAR ── */
  #statusbar {
    height: 26px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 20px;
    font-size: 10px;
    color: var(--text3);
    flex-shrink: 0;
  }
  .status-item { display: flex; align-items: center; gap: 4px; }
  .status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent3); }

  /* ── TEXT INPUT OVERLAY ── */
  #text-input-overlay {
    position: absolute;
    display: none;
    z-index: 200;
  }
  #text-input-overlay textarea {
    background: rgba(22,22,29,0.9);
    border: 2px solid var(--accent);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Cabinet Grotesk', sans-serif;
    font-size: 18px;
    padding: 8px 12px;
    resize: none;
    outline: none;
    min-width: 150px;
    min-height: 50px;
    backdrop-filter: blur(8px);
  }

  /* ── MODAL ── */
  #modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
  }
  #modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 340px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    box-shadow: var(--shadow);
  }
  .modal-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }
  .modal input {
    width: 100%;
    padding: 10px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .modal input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-btn {
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text2);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .modal-btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
  .modal-btn:hover { opacity: 0.85; }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 12px;
    color: var(--text);
    z-index: 2000;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.success { border-color: var(--accent3); color: var(--accent3); }
  #toast.error { border-color: var(--danger); color: var(--danger); }

  /* color picker */
  #custom-color { display: none; }

  /* Shapes toolbar */
  .shape-picker {
    display: flex;
    flex-direction: column;
    gap: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px;
    position: absolute;
    left: 70px;
    z-index: 300;
    display: none;
  }
  .shape-picker.open { display: flex; }

  #boards-sidebar {
    display: none;
    position: absolute;
    left: 64px;
    top: 0;
    bottom: 0;
    width: 200px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    z-index: 80;
    flex-direction: column;
    padding: 12px;
    gap: 8px;
    overflow-y: auto;
  }
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <div id="logo">Infinite<span>Board</span></div>
  <div id="board-tabs"></div>
  <button id="add-board-btn" title="New Board">+</button>
  <div id="topbar-actions">
    <button class="top-btn" id="btn-save-cloud">☁ Save Cloud</button>
    <button class="top-btn" id="btn-load-cloud">⬇ Load</button>
    <button class="top-btn primary" id="btn-export-pdf">⬡ PDF</button>
    <button class="top-btn success" id="btn-export-txt">✎ Notepad</button>
  </div>
</div>

<!-- WORKSPACE -->
<div id="workspace">

  <!-- TOOLBAR -->
  <div id="toolbar">
    <div class="tool-group">
      <button class="tool-btn active" data-tool="pen" id="tool-pen">
        ✏️<span class="tooltip">Pen [P]</span>
      </button>
      <button class="tool-btn" data-tool="eraser" id="tool-eraser">
        🧹<span class="tooltip">Eraser [E]</span>
      </button>
      <button class="tool-btn" data-tool="highlight" id="tool-highlight">
        🖌️<span class="tooltip">Highlighter [H]</span>
      </button>
    </div>
    <div class="tool-group">
      <button class="tool-btn" data-tool="line" id="tool-line">
        ╱<span class="tooltip">Line [L]</span>
      </button>
      <button class="tool-btn" data-tool="rect" id="tool-rect">
        ▭<span class="tooltip">Rectangle [R]</span>
      </button>
      <button class="tool-btn" data-tool="circle" id="tool-circle">
        ○<span class="tooltip">Circle [C]</span>
      </button>
      <button class="tool-btn" data-tool="arrow" id="tool-arrow">
        →<span class="tooltip">Arrow [A]</span>
      </button>
    </div>
    <div class="tool-group">
      <button class="tool-btn" data-tool="text" id="tool-text">
        T<span class="tooltip">Text [T]</span>
      </button>
      <button class="tool-btn" data-tool="sticky" id="tool-sticky">
        📝<span class="tooltip">Sticky Note [S]</span>
      </button>
    </div>
    <div class="tool-group">
      <button class="tool-btn" data-tool="pan" id="tool-pan">
        ✋<span class="tooltip">Pan [Space]</span>
      </button>
      <button class="tool-btn" data-tool="select" id="tool-select">
        ↖<span class="tooltip">Select [V]</span>
      </button>
    </div>
    <div class="tool-group">
      <input type="color" id="custom-color" value="#7c6aff">
      <div id="color-swatch" style="background:#7c6aff;" title="Color"></div>
    </div>
  </div>

  <!-- CANVAS -->
  <div id="canvas-container">
    <canvas id="main-canvas"></canvas>
    <div id="text-input-overlay">
      <textarea id="text-textarea" rows="2" placeholder="Type here..."></textarea>
    </div>
    <div id="zoom-controls">
      <button class="zoom-btn" id="zoom-out">−</button>
      <span id="zoom-level">100%</span>
      <button class="zoom-btn" id="zoom-in">+</button>
      <button class="zoom-btn" id="zoom-fit" title="Fit">⊞</button>
    </div>
  </div>

  <!-- PROPS PANEL -->
  <div id="props-panel">
    <div class="panel-title">Properties</div>

    <div class="prop-row">
      <div class="prop-label">Color</div>
      <div class="color-grid" id="color-grid"></div>
    </div>

    <div class="prop-row">
      <div class="prop-label">Stroke Width</div>
      <input type="range" class="prop-slider" id="stroke-slider" min="1" max="40" value="3">
    </div>

    <div class="prop-row">
      <div class="prop-label">Opacity <span class="opacity-display" id="opacity-display">100%</span></div>
      <input type="range" class="prop-slider" id="opacity-slider" min="10" max="100" value="100">
    </div>

    <div class="prop-row">
      <div class="prop-label">Font Size</div>
      <input type="range" class="prop-slider" id="font-slider" min="10" max="80" value="18">
    </div>

    <div class="panel-title" style="margin-top:4px">Board</div>
    <div class="board-stats" id="board-stats">
      <div class="stat-row"><span>Strokes</span><span class="stat-val" id="stat-strokes">0</span></div>
      <div class="stat-row"><span>Elements</span><span class="stat-val" id="stat-elements">0</span></div>
      <div class="stat-row"><span>Saved</span><span class="stat-val" id="stat-saved">—</span></div>
    </div>

    <div class="panel-title">Actions</div>
    <div class="action-grid">
      <button class="panel-btn highlight" id="btn-undo">↩ Undo</button>
      <button class="panel-btn highlight" id="btn-redo">↪ Redo</button>
      <button class="panel-btn" id="btn-clear">✕ Clear</button>
      <button class="panel-btn" id="btn-bg">⬡ BG</button>
      <button class="panel-btn danger" id="btn-delete-board">⊗ Delete</button>
      <button class="panel-btn" id="btn-rename">✎ Rename</button>
    </div>

    <div class="panel-title">Cloud Boards</div>
    <div id="cloud-boards-list" style="display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto;"></div>
  </div>

</div>

<!-- STATUSBAR -->
<div id="statusbar">
  <div class="status-item"><div class="status-dot"></div> Online</div>
  <div class="status-item" id="status-tool">Tool: Pen</div>
  <div class="status-item" id="status-pos">X: 0  Y: 0</div>
  <div class="status-item" id="status-boards">Boards: 1</div>
  <div class="status-item" id="status-msg">Ready</div>
</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div class="modal">
    <div class="modal-title" id="modal-title">New Board</div>
    <input type="text" id="modal-input" placeholder="Board name..." maxlength="40">
    <div class="modal-actions">
      <button class="modal-btn" id="modal-cancel">Cancel</button>
      <button class="modal-btn primary" id="modal-confirm">Create</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ─── GLOBALS ───────────────────────────────────────────────────────────────
const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('canvas-container');

let boards = {};          // { id: { name, strokes, background, created } }
let currentBoardId = null;
let activeTool = 'pen';
let activeColor = '#7c6aff';
let strokeWidth = 3;
let opacity = 1;
let fontSize = 18;
let isDrawing = false;
let startX, startY, lastX, lastY;
let currentStroke = null;
let snapshotBeforeShape = null;
let undoStack = {};
let redoStack = {};
let panOffset = { x: 0, y: 0 };
let zoom = 1;
let isPanning = false;
let panStart = { x: 0, y: 0 };
let panOffsetStart = { x: 0, y: 0 };
let spaceHeld = false;
let boardBgs = {};

const COLORS = [
  '#ffffff','#e8e8f0','#ff6ab0','#ff4f6a','#ffd166',
  '#6affcc','#7c6aff','#60a5fa','#34d399','#f97316',
  '#a78bfa','#fb923c','#4ade80','#38bdf8','#e879f9','#94a3b8'
];

// ─── STORAGE ───────────────────────────────────────────────────────────────
const STORAGE_KEY = 'infiniteboard_v2';

async function cloudSave() {
  try {
    const data = {
      boards,
      undoStack,
      boardBgs,
      savedAt: new Date().toISOString()
    };
    if (window.storage) {
      await window.storage.set(STORAGE_KEY, JSON.stringify(data));
    } else {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }
    document.getElementById('stat-saved').textContent = new Date().toLocaleTimeString();
    showToast('Saved to cloud ☁', 'success');
  } catch(e) {
    showToast('Save failed: ' + e.message, 'error');
  }
}

async function cloudLoad() {
  try {
    let raw;
    if (window.storage) {
      const result = await window.storage.get(STORAGE_KEY);
      raw = result ? result.value : null;
    } else {
      raw = localStorage.getItem(STORAGE_KEY);
    }
    if (!raw) { showToast('No saved data found', 'error'); return; }
    const data = JSON.parse(raw);
    boards = data.boards || {};
    undoStack = data.undoStack || {};
    boardBgs = data.boardBgs || {};
    // re-build redo
    redoStack = {};
    Object.keys(boards).forEach(id => { if (!redoStack[id]) redoStack[id] = []; });

    rebuildTabs();
    const ids = Object.keys(boards);
    if (ids.length) switchBoard(ids[0]);
    updateCloudBoardsList();
    showToast('Loaded from cloud ☁', 'success');
  } catch(e) {
    showToast('Load failed: ' + e.message, 'error');
  }
}

// ─── BOARDS ────────────────────────────────────────────────────────────────
function createBoard(name) {
  const id = 'board_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
  boards[id] = { name: name || 'Board ' + (Object.keys(boards).length + 1), strokes: [], created: new Date().toISOString() };
  undoStack[id] = [];
  redoStack[id] = [];
  boardBgs[id] = '#13131a';
  return id;
}

function switchBoard(id) {
  if (!boards[id]) return;
  currentBoardId = id;
  rebuildTabs();
  renderBoard();
  updateStats();
  updateCloudBoardsList();
}

function deleteBoard(id) {
  if (Object.keys(boards).length <= 1) { showToast('Cannot delete the last board', 'error'); return; }
  delete boards[id];
  delete undoStack[id];
  delete redoStack[id];
  delete boardBgs[id];
  const ids = Object.keys(boards);
  rebuildTabs();
  switchBoard(ids[ids.length - 1]);
  updateBoardCount();
}

function renameBoard(id, name) {
  if (!boards[id]) return;
  boards[id].name = name;
  rebuildTabs();
}

function rebuildTabs() {
  const container = document.getElementById('board-tabs');
  container.innerHTML = '';
  Object.entries(boards).forEach(([id, board]) => {
    const tab = document.createElement('div');
    tab.className = 'board-tab' + (id === currentBoardId ? ' active' : '');
    tab.innerHTML = `<div class="tab-dot"></div><span>${escHtml(board.name)}</span><button class="close-tab" data-id="${id}">×</button>`;
    tab.addEventListener('click', (e) => {
      if (!e.target.classList.contains('close-tab')) switchBoard(id);
    });
    tab.querySelector('.close-tab').addEventListener('click', (e) => {
      e.stopPropagation();
      deleteBoard(id);
    });
    container.appendChild(tab);
  });
  updateBoardCount();
}

function updateBoardCount() {
  document.getElementById('status-boards').textContent = 'Boards: ' + Object.keys(boards).length;
}

// ─── CANVAS SETUP ─────────────────────────────────────────────────────────
function resizeCanvas() {
  const rect = container.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;
  renderBoard();
}

function getCanvasPoint(e) {
  const rect = canvas.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return {
    x: (clientX - rect.left - panOffset.x) / zoom,
    y: (clientY - rect.top - panOffset.y) / zoom
  };
}

// ─── RENDER ────────────────────────────────────────────────────────────────
function renderBoard() {
  if (!currentBoardId || !boards[currentBoardId]) return;
  const board = boards[currentBoardId];
  const bg = boardBgs[currentBoardId] || '#13131a';
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.translate(panOffset.x, panOffset.y);
  ctx.scale(zoom, zoom);

  // BG
  ctx.fillStyle = bg;
  ctx.fillRect(-panOffset.x/zoom, -panOffset.y/zoom, canvas.width/zoom, canvas.height/zoom);

  // Draw all strokes
  board.strokes.forEach(s => drawStroke(s));

  ctx.restore();
  updateStats();
}

function drawStroke(s) {
  if (!s) return;
  ctx.save();
  ctx.globalAlpha = s.opacity || 1;
  ctx.strokeStyle = s.color || '#fff';
  ctx.fillStyle = s.color || '#fff';
  ctx.lineWidth = s.width || 2;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  switch(s.type) {
    case 'pen':
    case 'highlight':
      if (s.type === 'highlight') {
        ctx.globalAlpha = (s.opacity || 1) * 0.35;
        ctx.lineWidth = s.width * 3;
      }
      if (!s.points || s.points.length < 2) break;
      ctx.beginPath();
      ctx.moveTo(s.points[0].x, s.points[0].y);
      for (let i = 1; i < s.points.length - 1; i++) {
        const mx = (s.points[i].x + s.points[i+1].x) / 2;
        const my = (s.points[i].y + s.points[i+1].y) / 2;
        ctx.quadraticCurveTo(s.points[i].x, s.points[i].y, mx, my);
      }
      ctx.lineTo(s.points[s.points.length-1].x, s.points[s.points.length-1].y);
      ctx.stroke();
      break;

    case 'eraser':
      if (!s.points || s.points.length < 2) break;
      ctx.globalCompositeOperation = 'destination-out';
      ctx.globalAlpha = 1;
      ctx.lineWidth = s.width;
      ctx.beginPath();
      ctx.moveTo(s.points[0].x, s.points[0].y);
      s.points.forEach(p => ctx.lineTo(p.x, p.y));
      ctx.stroke();
      ctx.globalCompositeOperation = 'source-over';
      break;

    case 'line':
      ctx.beginPath();
      ctx.moveTo(s.x1, s.y1);
      ctx.lineTo(s.x2, s.y2);
      ctx.stroke();
      break;

    case 'rect':
      ctx.beginPath();
      ctx.strokeRect(s.x, s.y, s.w, s.h);
      if (s.fill) { ctx.globalAlpha = (s.opacity||1)*0.15; ctx.fillRect(s.x, s.y, s.w, s.h); }
      break;

    case 'circle':
      ctx.beginPath();
      ctx.ellipse(s.cx, s.cy, Math.abs(s.rx), Math.abs(s.ry), 0, 0, Math.PI*2);
      ctx.stroke();
      break;

    case 'arrow': {
      const dx = s.x2-s.x1, dy = s.y2-s.y1;
      const len = Math.sqrt(dx*dx+dy*dy);
      if (len < 1) break;
      const nx = dx/len, ny = dy/len;
      const hw = Math.min(16, s.width*4), hl = Math.min(22, s.width*6);
      ctx.beginPath();
      ctx.moveTo(s.x1, s.y1);
      ctx.lineTo(s.x2, s.y2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(s.x2, s.y2);
      ctx.lineTo(s.x2 - hl*nx + hw*ny, s.y2 - hl*ny - hw*nx);
      ctx.lineTo(s.x2 - hl*nx - hw*ny, s.y2 - hl*ny + hw*nx);
      ctx.closePath();
      ctx.fill();
      break;
    }

    case 'text':
      ctx.font = `${s.size||18}px 'Cabinet Grotesk', sans-serif`;
      ctx.fillStyle = s.color;
      ctx.globalAlpha = s.opacity || 1;
      (s.text||'').split('\n').forEach((line, i) => {
        ctx.fillText(line, s.x, s.y + i * (s.size||18) * 1.3);
      });
      break;

    case 'sticky': {
      const pad = 12, w = s.w||180, h = s.h||120;
      ctx.globalAlpha = s.opacity || 1;
      ctx.fillStyle = s.color;
      ctx.beginPath();
      ctx.roundRect(s.x, s.y, w, h, 8);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.globalAlpha = 0.75;
      ctx.font = `${s.size||14}px 'Cabinet Grotesk', sans-serif`;
      (s.text||'').split('\n').forEach((line, i) => {
        ctx.fillText(line, s.x+pad, s.y+pad+(s.size||14)*1.3*(i+1));
      });
      break;
    }
  }
  ctx.restore();
}

// ─── DRAW LOGIC ────────────────────────────────────────────────────────────
function startDraw(e) {
  if (e.button === 1 || spaceHeld || activeTool === 'pan') {
    isPanning = true;
    panStart = { x: e.clientX, y: e.clientY };
    panOffsetStart = { ...panOffset };
    canvas.style.cursor = 'grabbing';
    return;
  }
  if (activeTool === 'select') return;

  const p = getCanvasPoint(e);
  isDrawing = true;
  startX = p.x; startY = p.y;
  lastX = p.x; lastY = p.y;

  if (['pen','eraser','highlight'].includes(activeTool)) {
    currentStroke = {
      type: activeTool,
      color: activeTool === 'eraser' ? '#000' : activeColor,
      width: activeTool === 'eraser' ? strokeWidth * 3 : strokeWidth,
      opacity: activeTool === 'highlight' ? opacity : opacity,
      points: [{ x: p.x, y: p.y }]
    };
  } else if (['line','rect','circle','arrow'].includes(activeTool)) {
    snapshotBeforeShape = ctx.getImageData(0, 0, canvas.width, canvas.height);
    currentStroke = {
      type: activeTool, color: activeColor,
      width: strokeWidth, opacity,
      x1: p.x, y1: p.y, x2: p.x, y2: p.y,
      x: p.x, y: p.y, w: 0, h: 0,
      cx: p.x, cy: p.y, rx: 0, ry: 0
    };
  } else if (activeTool === 'text') {
    showTextInput(e.clientX, e.clientY, p.x, p.y, 'text');
    isDrawing = false;
  } else if (activeTool === 'sticky') {
    showTextInput(e.clientX, e.clientY, p.x, p.y, 'sticky');
    isDrawing = false;
  }
}

function continueDraw(e) {
  const p = getCanvasPoint(e);
  document.getElementById('status-pos').textContent = `X: ${Math.round(p.x)}  Y: ${Math.round(p.y)}`;

  if (isPanning) {
    panOffset.x = panOffsetStart.x + (e.clientX - panStart.x);
    panOffset.y = panOffsetStart.y + (e.clientY - panStart.y);
    renderBoard();
    return;
  }

  if (!isDrawing || !currentStroke) return;

  if (['pen','eraser','highlight'].includes(activeTool)) {
    currentStroke.points.push({ x: p.x, y: p.y });
    // Draw incrementally
    ctx.save();
    ctx.translate(panOffset.x, panOffset.y);
    ctx.scale(zoom, zoom);
    ctx.globalAlpha = activeTool === 'highlight' ? opacity * 0.35 : opacity;
    ctx.strokeStyle = currentStroke.color;
    ctx.lineWidth = activeTool === 'highlight' ? currentStroke.width * 3 : currentStroke.width;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    if (activeTool === 'eraser') {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.globalAlpha = 1;
    }
    const pts = currentStroke.points;
    if (pts.length >= 2) {
      ctx.beginPath();
      ctx.moveTo(pts[pts.length-2].x, pts[pts.length-2].y);
      ctx.lineTo(pts[pts.length-1].x, pts[pts.length-1].y);
      ctx.stroke();
    }
    ctx.restore();
    lastX = p.x; lastY = p.y;
  } else if (['line','rect','circle','arrow'].includes(activeTool)) {
    // Restore snapshot then draw preview
    ctx.putImageData(snapshotBeforeShape, 0, 0);
    ctx.save();
    ctx.translate(panOffset.x, panOffset.y);
    ctx.scale(zoom, zoom);

    const s = currentStroke;
    s.x2 = p.x; s.y2 = p.y;
    s.w = p.x - s.x1; s.h = p.y - s.y1;
    s.cx = (s.x1 + p.x)/2; s.cy = (s.y1 + p.y)/2;
    s.rx = Math.abs(p.x - s.x1)/2; s.ry = Math.abs(p.y - s.y1)/2;
    drawStroke(s);
    ctx.restore();
  }
}

function endDraw(e) {
  if (isPanning) {
    isPanning = false;
    canvas.style.cursor = activeTool === 'pan' ? 'grab' : 'crosshair';
    return;
  }
  if (!isDrawing || !currentBoardId) return;
  isDrawing = false;

  if (currentStroke) {
    const board = boards[currentBoardId];
    board.strokes.push(currentStroke);
    undoStack[currentBoardId] = undoStack[currentBoardId] || [];
    undoStack[currentBoardId].push([...board.strokes]);
    redoStack[currentBoardId] = [];
    currentStroke = null;
    snapshotBeforeShape = null;
    updateStats();
    renderBoard();
  }
}

// ─── TEXT INPUT ─────────────────────────────────────────────────────────────
function showTextInput(cx, cy, bx, by, mode) {
  const overlay = document.getElementById('text-input-overlay');
  const ta = document.getElementById('text-textarea');
  overlay.style.display = 'block';
  overlay.style.left = cx + 'px';
  overlay.style.top = cy + 'px';
  ta.value = '';
  ta.style.fontSize = fontSize + 'px';
  ta.style.color = mode === 'sticky' ? '#000' : activeColor;
  ta.style.background = mode === 'sticky' ? activeColor : 'rgba(22,22,29,0.9)';
  ta.focus();
  ta.dataset.bx = bx;
  ta.dataset.by = by;
  ta.dataset.mode = mode;
}

document.getElementById('text-textarea').addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    document.getElementById('text-input-overlay').style.display = 'none';
    return;
  }
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    commitText();
  }
});

function commitText() {
  const ta = document.getElementById('text-textarea');
  const text = ta.value.trim();
  const overlay = document.getElementById('text-input-overlay');
  overlay.style.display = 'none';
  if (!text || !currentBoardId) return;

  const mode = ta.dataset.mode;
  const x = parseFloat(ta.dataset.bx);
  const y = parseFloat(ta.dataset.by);

  let stroke;
  if (mode === 'sticky') {
    const lines = text.split('\n');
    const h = Math.max(80, lines.length * fontSize * 1.4 + 32);
    const w = Math.max(160, text.length * fontSize * 0.6 + 24);
    stroke = { type: 'sticky', x, y, w, h, text, color: activeColor, size: fontSize, opacity };
  } else {
    stroke = { type: 'text', x, y, text, color: activeColor, size: fontSize, opacity };
  }

  boards[currentBoardId].strokes.push(stroke);
  undoStack[currentBoardId].push([...boards[currentBoardId].strokes]);
  redoStack[currentBoardId] = [];
  renderBoard();
  updateStats();
}

// ─── UNDO / REDO ───────────────────────────────────────────────────────────
function undo() {
  if (!currentBoardId) return;
  const stack = undoStack[currentBoardId] || [];
  if (stack.length <= 1) {
    boards[currentBoardId].strokes = [];
    if (stack.length === 1) {
      redoStack[currentBoardId].push(stack.pop());
    }
  } else {
    redoStack[currentBoardId].push(stack.pop());
    boards[currentBoardId].strokes = [...(stack[stack.length-1] || [])];
  }
  renderBoard();
}

function redo() {
  if (!currentBoardId) return;
  const rstack = redoStack[currentBoardId] || [];
  if (!rstack.length) return;
  const state = rstack.pop();
  boards[currentBoardId].strokes = [...state];
  undoStack[currentBoardId].push(state);
  renderBoard();
}

// ─── TOOLS ────────────────────────────────────────────────────────────────
function setTool(tool) {
  activeTool = tool;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));

  if (btn) btn.classList.add('active');
  document.getElementById('status-tool').textContent = 'Tool: ' + tool.charAt(0).toUpperCase() + tool.slice(1);
  canvas.style.cursor = tool === 'pan' ? 'grab' : tool === 'eraser' ? 'cell' : 'crosshair';
}

document.querySelectorAll('.tool-btn').forEach(btn => {

});

// ─── ZOOM ─────────────────────────────────────────────────────────────────
function setZoom(z) {
  zoom = Math.max(0.1, Math.min(5, z));
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  renderBoard();
}

document.getElementById('zoom-in').addEventListener('click', () => setZoom(zoom * 1.2));
document.getElementById('zoom-out').addEventListener('click', () => setZoom(zoom / 1.2));

container.addEventListener('wheel', (e) => {

}, { passive: false });

// ─── CANVAS EVENTS ────────────────────────────────────────────────────────
canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', continueDraw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('mouseleave', endDraw);
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e.touches[0]); }, { passive: false });
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); continueDraw(e.touches[0]); }, { passive: false });
canvas.addEventListener('touchend', endDraw);

// Middle mouse pan
canvas.addEventListener('mousedown', (e) => {
  if (e.button === 1) { e.preventDefault(); startDraw(e); }
});

// ─── KEYBOARD ────────────────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.code === 'Space') { spaceHeld = true; canvas.style.cursor = 'grab'; e.preventDefault(); }
  if (e.ctrlKey || e.metaKey) {
    if (e.key === 'z') { e.preventDefault(); undo(); }
    if (e.key === 'y' || (e.shiftKey && e.key === 'z')) { e.preventDefault(); redo(); }
    if (e.key === 's') { e.preventDefault(); cloudSave(); }
  }
  const keys = { p:'pen', e:'eraser', h:'highlight', l:'line', r:'rect', c:'circle', a:'arrow', t:'text', s:'sticky', v:'select' };
  if (!e.ctrlKey && !e.metaKey && keys[e.key]) setTool(keys[e.key]);
});
document.addEventListener('keyup', (e) => {
  if (e.code === 'Space') { spaceHeld = false; canvas.style.cursor = 'crosshair'; }
});

// ─── STATS ────────────────────────────────────────────────────────────────
function updateStats() {
  if (!currentBoardId || !boards[currentBoardId]) return;
  const strokes = boards[currentBoardId].strokes;
  const pens = strokes.filter(s => ['pen','highlight'].includes(s.type)).length;
  const elems = strokes.filter(s => ['text','sticky','rect','circle','line','arrow'].includes(s.type)).length;
  document.getElementById('stat-strokes').textContent = pens;
  document.getElementById('stat-elements').textContent = elems;
}

    pdf.text(`InfiniteBoard — ${board.name} — ${new Date().toLocaleString()}`, 10, 207);
    pdf.save(`${board.name.replace(/\s+/g,'_')}.pdf`);
    showToast('PDF saved! ✓', 'success');
  } catch(e) {
    // Fallback: export current canvas
    try {
      const { jsPDF } = window.jspdf;
      const imgData = canvas.toDataURL('image/jpeg', 0.92);
      const pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
      pdf.addImage(imgData, 'JPEG', 0, 0, 297, 210);
      const board = boards[currentBoardId];
      pdf.setFontSize(8);
      pdf.setTextColor(150);
      pdf.text(`InfiniteBoard — ${board.name} — ${new Date().toLocaleString()}`, 10, 207);
      pdf.save(`${board.name.replace(/\s+/g,'_')}.pdf`);
      showToast('PDF saved! ✓', 'success');
    } catch(e2) {
      showToast('PDF error: ' + e2.message, 'error');
    }
  }
});

function drawStrokeOnCtx(c, s) {
  c.save();
  c.globalAlpha = s.opacity || 1;
  c.strokeStyle = s.color || '#fff';
  c.fillStyle = s.color || '#fff';
  c.lineWidth = s.width || 2;
  c.lineCap = 'round';
  c.lineJoin = 'round';

  switch(s.type) {
    case 'pen': case 'highlight':
      if (!s.points || s.points.length < 2) break;
      if (s.type === 'highlight') { c.globalAlpha *= 0.35; c.lineWidth *= 3; }
      c.beginPath();
      c.moveTo(s.points[0].x, s.points[0].y);
      for (let i = 1; i < s.points.length - 1; i++) {
        const mx = (s.points[i].x + s.points[i+1].x)/2, my = (s.points[i].y + s.points[i+1].y)/2;
        c.quadraticCurveTo(s.points[i].x, s.points[i].y, mx, my);
      }
      c.lineTo(s.points[s.points.length-1].x, s.points[s.points.length-1].y);
      c.stroke();
      break;
    case 'line':
      c.beginPath(); c.moveTo(s.x1,s.y1); c.lineTo(s.x2,s.y2); c.stroke(); break;
    case 'rect':
      c.strokeRect(s.x,s.y,s.w,s.h); break;
    case 'circle':
      c.beginPath(); c.ellipse(s.cx,s.cy,Math.abs(s.rx),Math.abs(s.ry),0,0,Math.PI*2); c.stroke(); break;
    case 'arrow': {
      const dx=s.x2-s.x1, dy=s.y2-s.y1, len=Math.sqrt(dx*dx+dy*dy);
      if (len<1) break;
      const nx=dx/len, ny=dy/len, hw=16, hl=22;
      c.beginPath(); c.moveTo(s.x1,s.y1); c.lineTo(s.x2,s.y2); c.stroke();
      c.beginPath(); c.moveTo(s.x2,s.y2);
      c.lineTo(s.x2-hl*nx+hw*ny, s.y2-hl*ny-hw*nx);
      c.lineTo(s.x2-hl*nx-hw*ny, s.y2-hl*ny+hw*nx);
      c.closePath(); c.fill(); break;
    }
    case 'text':
      c.font = `${s.size||18}px sans-serif`;
      c.fillStyle = s.color;
      (s.text||'').split('\n').forEach((line,i) => c.fillText(line, s.x, s.y+i*(s.size||18)*1.3));
      break;
    case 'sticky': {
      const pad=12, w=s.w||180, h=s.h||120;
      c.fillStyle = s.color;
      c.beginPath();
      if (c.roundRect) c.roundRect(s.x,s.y,w,h,8); else c.rect(s.x,s.y,w,h);
      c.fill();
      c.fillStyle='#000'; c.globalAlpha=0.75;
      c.font=`${s.size||14}px sans-serif`;
      (s.text||'').split('\n').forEach((line,i)=>c.fillText(line,s.x+pad,s.y+pad+(s.size||14)*1.3*(i+1)));
      break;
    }
  }
  c.restore();
}

// ─── EXPORT NOTEPAD ──────────────────────────────────────────────────────
document.getElementById('btn-export-txt').addEventListener('click', () => {
  if (!currentBoardId) return;
  const board = boards[currentBoardId];
  let lines = [`InfiniteBoard Export`, `Board: ${board.name}`, `Date: ${new Date().toLocaleString()}`, `Created: ${board.created}`, '', '='.repeat(50), ''];

  const texts = board.strokes.filter(s => ['text','sticky'].includes(s.type));
  if (texts.length) {
    lines.push('[ TEXT & STICKY NOTES ]', '');
    texts.forEach((s, i) => {
      lines.push(`${i+1}. [${s.type.toUpperCase()}] at (${Math.round(s.x)}, ${Math.round(s.y)})`);
      lines.push(s.text || '');
      lines.push('');
    });
  }

  lines.push('[ DRAWING ELEMENTS ]', '');
  const shapes = board.strokes.filter(s => ['rect','circle','line','arrow'].includes(s.type));
  shapes.forEach((s, i) => {
    if (s.type === 'rect') lines.push(`${i+1}. Rectangle at (${Math.round(s.x)}, ${Math.round(s.y)}) size ${Math.round(s.w)}×${Math.round(s.h)} color ${s.color}`);
    else if (s.type === 'circle') lines.push(`${i+1}. Ellipse at center (${Math.round(s.cx)}, ${Math.round(s.cy)}) rx=${Math.round(s.rx)} ry=${Math.round(s.ry)} color ${s.color}`);
    else if (s.type === 'line') lines.push(`${i+1}. Line from (${Math.round(s.x1)},${Math.round(s.y1)}) to (${Math.round(s.x2)},${Math.round(s.y2)}) color ${s.color}`);
    else if (s.type === 'arrow') lines.push(`${i+1}. Arrow from (${Math.round(s.x1)},${Math.round(s.y1)}) to (${Math.round(s.x2)},${Math.round(s.y2)}) color ${s.color}`);
  });

  lines.push('', '[ STATISTICS ]', '');
  lines.push(`Total strokes (pen/highlight): ${board.strokes.filter(s=>['pen','highlight','eraser'].includes(s.type)).length}`);
  lines.push(`Total elements (shapes/text): ${shapes.length + texts.length}`);
  lines.push(`Board background: ${boardBgs[currentBoardId] || '#13131a'}`);
  lines.push('', '='.repeat(50));
  lines.push('Generated by InfiniteBoard');

  const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${board.name.replace(/\s+/g,'_')}.txt`;
  a.click();
  showToast('Notepad saved! ✓', 'success');
});

// ─── CLOUD BOARDS LIST ───────────────────────────────────────────────────
function updateCloudBoardsList() {
  const list = document.getElementById('cloud-boards-list');
  list.innerHTML = '';
  Object.entries(boards).forEach(([id, board]) => {
    const row = document.createElement('div');
    row.style.cssText = `display:flex;align-items:center;justify-content:space-between;padding:6px 8px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);font-size:11px;cursor:pointer;transition:all 0.1s;`;
    row.innerHTML = `<span style="color:${id===currentBoardId?'var(--accent)':'var(--text2)'}">${escHtml(board.name)}</span><span style="color:var(--text3)">${board.strokes.length} el</span>`;
    row.addEventListener('click', () => switchBoard(id));
    row.addEventListener('mouseenter', () => row.style.background = 'var(--surface3)');
    row.addEventListener('mouseleave', () => row.style.background = 'var(--surface2)');
    list.appendChild(row);
  });
}

// ─── MODAL ────────────────────────────────────────────────────────────────
let modalCallback = null;
function openModal(title, defaultVal, callback, confirmLabel) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-input').value = defaultVal;
  document.getElementById('modal-confirm').textContent = confirmLabel || 'OK';
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-input').focus();
  modalCallback = callback;
}
document.getElementById('modal-cancel').addEventListener('click', () => {
  document.getElementById('modal-overlay').classList.remove('open');
});
document.getElementById('modal-confirm').addEventListener('click', () => {
  const val = document.getElementById('modal-input').value.trim();
  document.getElementById('modal-overlay').classList.remove('open');
  if (modalCallback) modalCallback(val);
});
document.getElementById('modal-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('modal-confirm').click();
  if (e.key === 'Escape') document.getElementById('modal-cancel').click();
});

// ─── TOAST ────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = '', 2500);
}

// ─── RESIZE ───────────────────────────────────────────────────────────────
const ro = new ResizeObserver(resizeCanvas);
ro.observe(container);

// ─── INIT ─────────────────────────────────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function init() {
  const id = createBoard('Main Board');
  rebuildTabs();
  switchBoard(id);
  resizeCanvas();
  showToast('Welcome to InfiniteBoard ✦', 'success');

  // Auto-save every 60s
  setInterval(() => {
    if (Object.keys(boards).length) cloudSave().catch(()=>{});
  }, 60000);
}

init();
</script>
